<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Attendance - Admin Login</title>
    <link rel="stylesheet" href="/static/admin/css/modules/login.css">
<body>
<div class="login-container">
    <h1>Campus Attendance Admin</h1>
    <div id="error" class="error"></div>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <div id="emailError" class="field-error"></div>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <div id="passwordError" class="field-error"></div>
        </div>
        <button type="submit" id="submitBtn">
            <span class="button-text">Login</span>
            <span class="success-check" id="successCheck">✓</span>
        </button>
    </form>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorDiv = document.getElementById('error');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const successCheck = document.getElementById('successCheck');
    const buttonText = document.querySelector('.button-text');

    // Clear field errors on input
    emailInput.addEventListener('input', () => {
        emailInput.classList.remove('error');
        emailError.style.display = 'none';
        errorDiv.style.display = 'none';
    });

    passwordInput.addEventListener('input', () => {
        passwordInput.classList.remove('error');
        passwordError.style.display = 'none';
        errorDiv.style.display = 'none';
    });

    // Validate form
    function validateForm() {
        let isValid = true;

        if (!emailInput.value.trim()) {
            emailInput.classList.add('error');
            emailError.textContent = 'Email is required';
            emailError.style.display = 'block';
            isValid = false;
        } else if (!isValidEmail(emailInput.value)) {
            emailInput.classList.add('error');
            emailError.textContent = 'Please enter a valid email';
            emailError.style.display = 'block';
            isValid = false;
        }

        if (!passwordInput.value) {
            passwordInput.classList.add('error');
            passwordError.textContent = 'Password is required';
            passwordError.style.display = 'block';
            isValid = false;
        }

        return isValid;
    }

    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function setLoading(isLoading) {
        if (isLoading) {
            submitBtn.disabled = true;
            // Create and add spinner
            const spinner = document.createElement('span');
            spinner.className = 'spinner';
            spinner.id = 'spinner';
            submitBtn.classList.add('loading');
            submitBtn.appendChild(spinner);
        } else {
            submitBtn.disabled = false;
            submitBtn.classList.remove('loading');
            const spinner = document.getElementById('spinner');
            if (spinner) spinner.remove();
        }
    }

    function showSuccess() {
        buttonText.style.display = 'none';
        successCheck.style.display = 'inline-block';
        submitBtn.style.background = 'linear-gradient(135deg, #4caf50 0%, #45a049 100%)';

        // Reset after 1 second
        setTimeout(() => {
            buttonText.style.display = 'inline';
            successCheck.style.display = 'none';
            submitBtn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
        }, 1000);
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Hide any previous errors
        errorDiv.style.display = 'none';

        // Validate form
        if (!validateForm()) {
            return;
        }

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // Show loading
        setLoading(true);

        try {
            const response = await fetch('/admin/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);

                // Show success animation
                showSuccess();

                // Redirect to admin dashboard
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 500);
            } else {
                let errorMessage = 'Login failed';
                try {
                    const errorText = await response.text();
                    errorMessage = errorText || `Error ${response.status}: ${response.statusText}`;
                } catch {
                    errorMessage = `Error ${response.status}: ${response.statusText}`;
                }

                errorDiv.textContent = errorMessage;
                errorDiv.style.display = 'block';
                setLoading(false);
            }
        } catch (err) {
            console.error('Login error:', err);
            errorDiv.textContent = 'Network error. Please check your connection and try again.';
            errorDiv.style.display = 'block';
            setLoading(false);
        }
    });
</script>
</body>
</html>
