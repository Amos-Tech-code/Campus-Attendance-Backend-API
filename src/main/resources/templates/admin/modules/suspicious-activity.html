<!-- templates/admin/modules/suspicious-activity.html -->
<div>
    <div class="suspicious-header">
        <div class="stats-summary" id="suspiciousStats">
            <div class="stat-card-small">
                <div class="stat-value" id="totalSuspicious">0</div>
                <div class="stat-label">Total Suspicious</div>
            </div>
            <div class="stat-card-small">
                <div class="stat-value" id="pendingReview">0</div>
                <div class="stat-label">Pending Review</div>
            </div>
        </div>

        <div class="header-actions">
            <div class="filter-group">
                <select id="unitFilter" onchange="suspiciousFilterByUnit()" class="filter-select">
                    <option value="">All Units</option>
                </select>
            </div>
            <div class="search-box">
                <input type="text" id="searchSuspicious" placeholder="Search by student name or reg no..." class="search-input">
                <button onclick="suspiciousSearch()" class="btn-primary">Search</button>
            </div>
        </div>
    </div>

    <div class="data-table">
        <table>
            <thead>
            <tr>
                <th>Student</th>
                <th>Reg No</th>
                <th>Unit</th>
                <th>Method</th>
                <th>Suspicious Reason</th>
                <th>Location</th>
                <th>Device</th>
                <th>Time</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="suspicious-table-body">
            <tr><td colspan="9" class="loading-text">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" id="suspicious-pagination"></div>
</div>
